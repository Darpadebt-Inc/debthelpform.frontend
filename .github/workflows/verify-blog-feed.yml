name: Verify Blog Feed Integrity

# BLOCKING gate. Enforces blogs.json <-> blog/ file consistency (no null entries,
# no dead links, no orphans) so a partial/bad blog commit can never land on main.
# Counterpart to worker 033's atomic publish: 033 stops creating drift, this stops
# drift from landing.

on:
  push:
    branches: [ main ]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: verify-blog-feed-${{ github.ref_name }}
  cancel-in-progress: true

jobs:
  verify:
    name: blogs.json integrity
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - name: Verify blog feed
        run: node scripts/verify-blog-feed.mjs
      # C5FT: report-only client-surface sanitizer shadow (duplicate pretty URLs,
      # date-suffix slug mutants, malformed index url fields). Observational only:
      # the script always exits 0 and the step is continue-on-error as well.
      - name: Client-surface sanitizer shadow (report-only)
        continue-on-error: true
        run: node scripts/check-client-surface-sanitizer-shadow.mjs
      # Ported from DRG for gate parity. Non-blocking until the G8 content-drift
      # remediation wave lands (54 findings: missing /blog/*.html _headers rule,
      # per-slug-only _redirects, hero/url mismatches) — see
      # debthelpform.backend docs/blog-live-fire-gap-analysis-2026-07-02.md.
      - name: Check blog structure (033 commit contract, report-only)
        continue-on-error: true
        run: node scripts/check-blog-structure.mjs
      - name: Check blog readiness (033 commit prerequisites, report-only)
        continue-on-error: true
        run: node scripts/check-blog-ready.mjs
      # §10 contract validators are blocking: legacy corpus is report-only via
      # scripts/blog-legacy-manifest.json; new/changed posts must conform.
      - name: Blog contract — article anatomy (§10, block new/changed)
        run: node scripts/check-blog-article-anatomy.mjs
      - name: Blog contract — contextual cross-site only (§10)
        run: node scripts/check-blog-cross-site-contextual-only.mjs
      - name: Blog contract — H2/H3 density (§10)
        run: node scripts/check-blog-h2-h3-density.mjs
      - name: Blog contract — density chrome-parity selftest (E3-FVP fixtures)
        run: node scripts/check-blog-density-selftest.mjs
      - name: Blog contract — lead-capture efficiency (§10)
        run: node scripts/check-blog-lead-capture-contract.mjs
